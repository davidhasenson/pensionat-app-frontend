<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pensionat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <h1>Välkommen till Pensionat</h1>

    <p>Välkommen till vårt pensionat! Här hittar du information om våra tjänster.</p>


    <section>
        <h2>Skapa kund</h2>
        <label for="firstName">Förnamn</label>
        <br>
        <input id="firstName" placeholder="Förnamn">
        <br>
        <label for="lastName">Efternamn</label>
        <br>
        <input id="lastName" placeholder="Efternamn">
        <br>
        <label for="email">email</label>
        <br>
        <input id="email" placeholder="email">
        <br>
        <label for="phone">Telefon</label>
        <br>
        <input id="phone" placeholder="Telefon">
        <br>
        <button onclick="createCustomer()">Skapa kund</button>


    </section>
    
    <section>
        <h2>Rum</h2>
        <button onClick="loadRooms()">Visa rum</button>
        <ul id="rooms"></ul>
    </section>
    
    <div class="card mb-4">
        <div class="card-body">
            <h2>Skapa bokning</h2>

            <label class="form-label">Kund</label>
            <select id="customerId" class="form-select mb-2"></select>

            <label class="form-label">Rum</label>
            <select id="roomId" class="form-select mb-2"></select>

            <label class="form-label">Startdatum</label>
            <input id="startDate" type="date" class="form-control mb-2">

            <label class="form-label">Slutdatum</label>
            <input id="endDate" type="date" class="form-control mb-3">
        
            <button onclick="loadCustomersForBooking(); loadRoomsForBooking();">
            Ladda kunder och rum
            </button>
            <br><br>
            <button class="btn btn-success" onclick="createBooking()">Skapa bokning
            </button>
        </div>
    </div>

    <p id="message"></p>

    <script src="script.js"></script>
</body>

</html>
