<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pensionat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container my-5">

        <div class="text-center mb-5">
            <h1 class="display-4 fw-bold text-primary">Välkommen till Pensionat</h1>
            <p class="lead text-muted">Här hittar du information om våra tjänster och hanterar dina bokningar.</p>
        </div>

        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">

                <div class="card shadow-sm mb-5">
                    <div class="card-header bg-primary text-white py-3">
                        <h2 class="h5 mb-0 text-center">Skapa ny kund</h2>
                    </div>
                    <div class="card-body p-4">
                        <div class="mb-3">
                            <label for="firstName" class="form-label fw-semibold">Förnamn</label>
                            <input type="text" id="firstName" class="form-control" placeholder="Förnamn">
                        </div>
                        <div class="mb-3">
                            <label for="lastName" class="form-label fw-semibold">Efternamn</label>
                            <input type="text" id="lastName" class="form-control" placeholder="Efternamn">
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label fw-semibold">E-postadress</label>
                            <input type="email" id="email" class="form-control" placeholder="E-postadress">
                        </div>
                        <div class="mb-4">
                            <label for="phone" class="form-label fw-semibold">Telefonnummer</label>
                            <input type="tel" id="phone" class="form-control" placeholder="Telefonnummer">
                        </div>
                        <button onclick="createCustomer()" class="btn btn-primary w-100 py-2 fw-bold">
                            Skapa kund
                        </button>
                        <div id="customer-message" class="mt-3 text-center fw-medium"></div>
                    </div>
                </div>
                <div class="card shadow-sm mb-5">
                    <div class="card-header bg-warning text-dark py-3">
                        <h2 class="h5 mb-0 text-center fw-bold">Uppdatera kunduppgifter</h2>
                    </div>
                    <div class="card-body p-4">
                        <div class="mb-3">
                            <label for="updateSearchEmail" class="form-label fw-semibold">Sök kund på
                                e-postadress</label>
                            <div class="input-group">
                                <input type="email" id="updateSearchEmail" class="form-control"
                                    placeholder="namn@test.com">
                                <button class="btn btn-dark" type="button"
                                    onclick="fetchCustomerForUpdate()">Hämta</button>
                            </div>
                        </div>

                        <hr>

                        <div class="mb-3">
                            <label for="updateFirstName" class="form-label fw-semibold">Förnamn</label>
                            <input type="text" id="updateFirstName" class="form-control" disabled>
                        </div>
                        <div class="mb-3">
                            <label for="updateLastName" class="form-label fw-semibold">Efternamn</label>
                            <input type="text" id="updateLastName" class="form-control" disabled>
                        </div>
                        <div class="mb-4">
                            <label for="updatePhone" class="form-label fw-semibold">Telefonnummer</label>
                            <input type="tel" id="updatePhone" class="form-control" disabled>
                        </div>

                        <button id="updateSubmitBtn" onclick="updateCustomer()"
                            class="btn btn-warning w-100 py-2 fw-bold text-dark" disabled>
                            Spara ändringar
                        </button>
                        <div id="update-message" class="mt-3 text-center fw-medium"></div>
                    </div>
                </div>

                <div class="card shadow-sm mb-5">
                    <div class="card-header bg-success text-white py-3">
                        <h2 class="h5 mb-0 text-center">Skapa bokning</h2>
                    </div>
                    <div class="card-body p-4">
                        <div class="mb-3">
                            <label for="customerEmail" class="form-label fw-semibold">Kundens e-postadress</label>
                            <input type="email" id="customerEmail" class="form-control" placeholder="namn@företag.se">
                        </div>
                        <div class="mb-3">
                            <label for="roomId" class="form-label fw-semibold">Rum</label>
                            <select id="roomId" class="form-select">
                                <option value="">-- Välj rum --</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="startDate" class="form-label fw-semibold">Startdatum</label>
                            <input id="startDate" type="date" class="form-control">
                        </div>
                        <div class="mb-4">
                            <label for="endDate" class="form-label fw-semibold">Slutdatum</label>
                            <input id="endDate" type="date" class="form-control">
                        </div>
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="extraBedRequested">
                            <label class="form-check-label" for="extraBedRequested">
                                Önskar extra säng
                            </label>
                        </div>
                        <button class="btn btn-success w-100 py-2 fw-bold" onclick="createBooking()">
                            Skapa bokning
                        </button>
                        <div id="booking-message" class="mt-3 text-center fw-medium"></div>
                    </div>
                </div>

                <div class="card shadow-sm">
                    <div class="card-header bg-dark text-white text-center py-3">
                        <h2 class="h5 mb-0">Sök lediga rum</h2>
                    </div>

                    <div class="card-body bg-light border-bottom p-3">
                        <div class="row g-2">
                            <div class="col-6">
                                <label for="searchStartDate" class="form-label small fw-bold">Incheckning</label>
                                <input type="date" id="searchStartDate" class="form-control">
                            </div>
                            <div class="col-6">
                                <label for="searchEndDate" class="form-label small fw-bold">Utcheckning</label>
                                <input type="date" id="searchEndDate" class="form-control">
                            </div>
                            <div class="col-12 mt-2">
                                <button onclick="searchAvailableRooms()" class="btn btn-dark w-100 fw-bold">
                                    🔍 Sök tillgängliga rum
                                </button>
                            </div>
                        </div>
                        <div id="search-message" class="mt-2 text-center small fw-medium"></div>
                    </div>

                    <div class="card-body p-0">
                        <ul id="rooms" class="list-group list-group-flush text-center">
                            <li class="list-group-item text-muted py-3">Välj datum ovan och sök för att se lediga rum...
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="modal fade" id="customerModal" tabindex="-1" aria-labelledby="customerModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="customerModalLabel">🎉 Kund skapad</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" id="customerModalBody" style="white-space: pre-line;">
                </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Stäng</button>
            </div>
        </div>
    </div>
</div>
    <div class="modal fade" id="bookingModal" tabindex="-1" aria-labelledby="bookingModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title" id="bookingModalLabel">🎉 Bokningsbekräftelse</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>
                <div class="modal-body" id="bookingModalBody" style="white-space: pre-line;">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Stäng</button>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</body>

</html>
